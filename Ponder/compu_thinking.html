
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 Dynamic Web Fundamentals</title>
    <link rel="stylesheet" href="dom-theme.css">
    <script src="dom-theme.js" defer></script>
  </head>
  <body>
    <div class="container">
        <h1>Pick a Theme</h1>
        <select id="theme-select">
            <option value="">-- Select a Theme --</option>
            <option value="ocean">Ocean</option>
            <option value="forest">Forest</option>
            <option value="desert">Desert</option>
            <option value="poochyena">Poochyena</option>
        </select>
        <div class="content">
            <p>Try switching themes to change the page's look!</p>
        </div>
        <img id="logo" src="https://img.pokemondb.net/sprites/ruby-sapphire/shiny/poochyena.png" alt="Poochyena">
    </div>
  </body>
</html>

    Event listener for clicking dropdown menu
    event listener for clicking buttons in dropdown menu
    change css depending on which button was clicked -->
